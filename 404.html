<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>הדף לא נמצא | Baby Vibes</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#FBF7F1" />
  <link rel="icon" href="/roni-sleep/assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/roni-sleep/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/roni-sleep/assets/style.css" />
  <style>
    .nf {
      min-height: 100vh; display: grid; place-items: center; text-align: center;
      padding: 3rem clamp(1.2rem, 5vw, 2.4rem);
      background:
        radial-gradient(1000px 480px at 85% -10%, var(--blush), transparent 60%),
        radial-gradient(760px 420px at 4% 110%, var(--sage-soft), transparent 56%),
        var(--bg);
    }
    .nf-inner { max-width: 560px; }
    .nf .code { font-family: var(--font-brand); font-size: clamp(3.5rem, 12vw, 6rem); color: var(--clay-deep); line-height: 1; margin: 0 0 .4rem; }
    .nf h1 { font-size: clamp(1.5rem, 4vw, 2.1rem); margin: 0 0 .8rem; }
    .nf p { color: var(--ink-soft); font-size: 1.08rem; margin: 0 auto 1.8rem; max-width: 42ch; }
    .nf .brandline { font-family: var(--font-brand); font-size: 1.4rem; color: var(--ink); margin-bottom: 1.6rem; }
  </style>
</head>
<body>
  <main class="nf">
    <div class="nf-inner">
      <p class="brandline">Baby Vibes</p>
      <p class="code">אופס</p>
      <h1>הדף שחיפשתם לא נמצא</h1>
      <p>ייתכן שהקישור השתנה או שנפלה טעות קטנה בכתובת. אפשר לחזור לעמוד הבית ולהמשיך משם. 🤍</p>
      <a class="btn btn-primary btn-lg" href="/roni-sleep/">חזרה לעמוד הבית</a>
    </div>
  </main>
</body>
</html>
